      function App() {
        const [phase, setPhase] = useState("home");
        const [patientIndex, setPatientIndex] = useState(0);
        const [timeLeft, setTimeLeft] = useState(TIMER_SECONDS);
        const [livesSaved, setLivesSaved] = useState(0);
        const [moneyWasted, setMoneyWasted] = useState(0);
        const [feedback, setFeedback] = useState(null);
        const [gameOver, setGameOver] = useState(false);
        const [quit, setQuit] = useState(false);
        const [usedChoices, setUsedChoices] = useState([]);
        const nextTimeoutRef = useRef(null);

        const patient = CASES[patientIndex];

        const progressLabel = useMemo(
          () => `${Math.min(patientIndex + 1, CASES.length)}/${CASES.length}`,
          [patientIndex]
        );

        useEffect(() => {
          return () => {
            if (nextTimeoutRef.current) {
              window.clearTimeout(nextTimeoutRef.current);
            }
          };
        }, []);

        useEffect(() => {
          if (phase !== "playing" || gameOver || quit || feedback) return undefined;

          if (timeLeft <= 0) {
            const wrongChoices = TRIAGE_OPTIONS.filter(
              (option) => !patient.acceptable.includes(option)
            );
            const randomWrong = pickRandom(wrongChoices);
            resolveChoice(randomWrong, true);
            return undefined;
          }

          const timer = window.setTimeout(() => {
            setTimeLeft((value) => value - 1);
          }, 1000);

          return () => window.clearTimeout(timer);
        }, [timeLeft, feedback, gameOver, quit, patient, phase]);

        const restartGame = () => {
          if (nextTimeoutRef.current) {
            window.clearTimeout(nextTimeoutRef.current);
            nextTimeoutRef.current = null;
          }
          setPhase("home");
          setPatientIndex(0);
          setTimeLeft(TIMER_SECONDS);
          setLivesSaved(0);
          setMoneyWasted(0);
          setFeedback(null);
          setGameOver(false);
          setQuit(false);
          setUsedChoices([]);
        };

        const startGame = () => {
          setPhase("playing");
          setPatientIndex(0);
          setTimeLeft(TIMER_SECONDS);
          setLivesSaved(0);
          setMoneyWasted(0);
          setFeedback(null);
          setGameOver(false);
          setQuit(false);
          setUsedChoices([]);
        };

        const finishGame = () => {
          setGameOver(true);
          setFeedback(null);
        };

        const goNext = () => {
          if (patientIndex >= CASES.length - 1) {
            finishGame();
            return;
          }
          setPatientIndex((value) => value + 1);
          setTimeLeft(TIMER_SECONDS);
          setFeedback(null);
        };

        const resolveChoice = (choice, timedOut = false) => {
          if (feedback || gameOver || quit || phase !== "playing") return;

          const isAcceptable = patient.acceptable.includes(choice);
          const idealRank = TRIAGE_RANK[patient.ideal];
          const choiceRank = TRIAGE_RANK[choice];
          const overtriage = choiceRank > idealRank;
          const undertriage = choiceRank < idealRank;
          const fatalUndertriage = patient.deathChoices.includes(choice);

          let moneyDelta = 0;
          let savedDelta = 0;
          let roast = "";

          if (isAcceptable) {
            savedDelta = 1;
            roast = patient.optionRoasts[choice] || pickRandom(CORRECT_ROASTS);
            if (overtriage) {
              moneyDelta = TRIAGE_COST[choice] - TRIAGE_COST[patient.ideal];
            }
          } else if (fatalUndertriage) {
            roast = patient.deathText;
          } else {
            roast =
              patient.optionRoasts[choice] ||
              (undertriage
                ? "Wrong and dangerously optimistic. A terrible combo."
                : "Wrong, expensive, and somehow still confident.");
            if (overtriage) {
              moneyDelta = TRIAGE_COST[choice] - TRIAGE_COST[patient.ideal];
            }
          }

          if (timedOut) {
            roast = `You froze, the clock picked "${choice}" for you, and somehow that made things worse. ${roast}`;
          }

          setLivesSaved((value) => value + savedDelta);
          setMoneyWasted((value) => value + moneyDelta);
          setUsedChoices((value) => [
            ...value,
            { patient: patient.name, choice, savedDelta, moneyDelta },
          ]);
          setFeedback({
            title: isAcceptable ? "Patient Mostly Survived" : "Administrative Disaster",
            choice,
            roast,
            savedDelta,
            moneyDelta,
          });

          nextTimeoutRef.current = window.setTimeout(goNext, FEEDBACK_MS);
        };

        const getFinalMessage = () => {
          if (livesSaved === 10 && moneyWasted >= 200000) {
            return "You saved everyone but bankrupted the hospital. The ICU is now a Panera Bread.";
          }
          if (livesSaved === 10 && moneyWasted < 200000) {
            return "You're annoyingly good at this. Please never actually practice medicine, you'd make the rest of us look bad.";
          }
          if (livesSaved >= 8) {
            return "Not bad. A couple people died but statistically that happens anyway.";
          }
          if (livesSaved >= 5) {
            return "Half your patients survived. Glass half full. The other glass is a malpractice suit.";
          }
          return "You are a menace. Multiple families are grieving. Please return to the waiting room.";
        };

        if (quit) {
          return (
            <div className="min-h-screen px-4 py-8 text-slate-900">
              <div className="mx-auto max-w-3xl rounded-[2rem] border border-slate-200 bg-white p-8 shadow-soft sm:p-10">
                <p className="text-sm font-bold uppercase tracking-[0.28em] text-sky-700">Shift Ended</p>
                <h1 className="mt-3 text-3xl font-black tracking-tight sm:text-4xl">You left the ER.</h1>
                <p className="mt-4 text-base text-slate-600 sm:text-lg">
                  Honestly, probably your best clinical decision all day.
                </p>
                <button
                  onClick={restartGame}
                  className="mt-8 rounded-full bg-slate-900 px-6 py-3 text-sm font-bold text-white transition hover:bg-slate-700"
                >
                  Start Over
                </button>
              </div>
            </div>
          );
        }

        if (gameOver) {
          return (
            <div className="min-h-screen px-4 py-8 text-slate-900">
              <div className="mx-auto max-w-4xl rounded-[2rem] border border-white/80 bg-white/90 p-6 shadow-soft backdrop-blur sm:p-8">
                <div className="flex flex-wrap items-start justify-between gap-4">
                  <div>
                    <p className="text-sm font-bold uppercase tracking-[0.28em] text-rose-600">Triage Complete</p>
                    <h1 className="mt-3 text-3xl font-black tracking-tight sm:text-4xl">Your Shift Report Card</h1>
                    <p className="mt-3 max-w-2xl text-base text-slate-600 sm:text-lg">{getFinalMessage()}</p>
                  </div>
                  <div className="rounded-[1.5rem] bg-slate-900 px-5 py-4 text-white shadow-lg">
                    <div className="text-xs font-semibold uppercase tracking-[0.24em] text-slate-300">Final Damage</div>
                    <div className="mt-2 text-3xl font-black">{livesSaved}/10</div>
                    <div className="text-sm text-slate-300">Lives Saved</div>
                    <div className="mt-3 text-2xl font-black text-rose-300">{currency(moneyWasted)}</div>
                    <div className="text-sm text-slate-300">Money Wasted</div>
                  </div>
                </div>

                <div className="mt-8 grid gap-4 md:grid-cols-2">
                  <button
                    onClick={restartGame}
                    className="rounded-2xl bg-sky-600 px-5 py-4 text-lg font-bold text-white transition hover:bg-sky-500"
                  >
                    Play Again
                  </button>
                  <button
                    onClick={() => setQuit(true)}
                    className="rounded-2xl border border-slate-300 bg-white px-5 py-4 text-lg font-bold text-slate-700 transition hover:bg-slate-50"
                  >
                    Quit
                  </button>
                </div>

                <div className="mt-8 rounded-[1.5rem] border border-slate-200 bg-slate-50 p-5">
                  <p className="text-sm font-bold uppercase tracking-[0.22em] text-slate-500">Decision Trail</p>
                  <div className="mt-4 grid gap-2">
                    {usedChoices.map((entry, index) => (
                      <div
                        key={entry.patient + "-" + entry.choice + "-" + index}
                        className="flex items-center justify-between gap-3 rounded-xl bg-white px-4 py-3 text-sm shadow-sm"
                      >
                        <span className="font-semibold text-slate-700">
                          {entry.patient}: {entry.choice}
                        </span>
                        <span className={entry.savedDelta ? "font-bold text-emerald-600" : "font-bold text-rose-600"}>
                          {entry.savedDelta ? "+1 life" : "0 lives"}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        if (phase === "home") {
          return (
            <div className="min-h-screen px-4 py-6 text-slate-900 sm:py-8">
              <div className="mx-auto max-w-6xl">
                <div className="rounded-[2.4rem] border border-white/80 bg-white/80 p-6 shadow-soft backdrop-blur sm:p-8">
                  <div className="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
                    <div className="max-w-3xl">
                      <p className="text-sm font-bold uppercase tracking-[0.3em] text-sky-700">ER Triage Game</p>
                      <h1 className="mt-3 text-4xl font-black tracking-tight sm:text-5xl">
                        Decide fast. Get roasted faster.
                      </h1>
                      <p className="mt-4 text-base leading-relaxed text-slate-600 sm:text-lg">
                        You have 10 seconds per patient to choose between home, urgent care, the ER, or the ICU.
                        Save lives, waste as little money as possible, and try not to accidentally convert the hospital into a Panera Bread.
                      </p>
                    </div>
                    <div className="flex flex-col gap-3 sm:flex-row">
                      <button
                        onClick={startGame}
                        className="rounded-2xl bg-sky-600 px-6 py-4 text-lg font-bold text-white transition hover:bg-sky-500"
                      >
                        Start Shift
                      </button>
                      <button
                        onClick={() => setQuit(true)}
                        className="rounded-2xl border border-slate-300 bg-white px-6 py-4 text-lg font-bold text-slate-700 transition hover:bg-slate-50"
                      >
                        Quit
                      </button>
                    </div>
                  </div>

                  <div className="mt-8 grid gap-4 md:grid-cols-3">
                    <div className="rounded-[1.5rem] bg-emerald-50 p-4">
                      <div className="text-sm font-bold uppercase tracking-[0.22em] text-emerald-700">Goal</div>
                      <p className="mt-2 text-sm text-slate-700">Get as many patients through alive as possible. Acceptable triage still counts.</p>
                    </div>
                    <div className="rounded-[1.5rem] bg-rose-50 p-4">
                      <div className="text-sm font-bold uppercase tracking-[0.22em] text-rose-700">Cost</div>
                      <p className="mt-2 text-sm text-slate-700">Money wasted only tracks overtriage. If you send a disaster home, the patient pays for it. Emotionally, so do you.</p>
                    </div>
                    <div className="rounded-[1.5rem] bg-sky-50 p-4">
                      <div className="text-sm font-bold uppercase tracking-[0.22em] text-sky-700">Pace</div>
                      <p className="mt-2 text-sm text-slate-700">If time runs out, the game picks a random wrong answer and publicly shames your indecision.</p>
                    </div>
                  </div>

                  <div className="mt-8">
                    <div className="mb-4 flex items-center justify-between gap-3">
                      <h2 className="text-2xl font-black tracking-tight sm:text-3xl">How the screen works</h2>
                      <div className="rounded-full bg-slate-900 px-4 py-2 text-xs font-bold uppercase tracking-[0.22em] text-white">
                        Read this once, save two patients
                      </div>
                    </div>
                    <TutorialPanel />
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="min-h-screen px-3 py-3 pb-28 text-slate-900 sm:px-4 sm:py-6 sm:pb-6">
            <div className="mx-auto max-w-6xl">
              <div className="mb-4 flex items-center justify-between gap-3 rounded-[1.5rem] border border-white/70 bg-white/80 px-4 py-3 shadow-soft backdrop-blur sm:mb-6 sm:flex-wrap sm:gap-4 sm:rounded-[2rem] sm:px-6 sm:py-5">
                <div>
                  <p className="text-sm font-bold uppercase tracking-[0.28em] text-sky-700">ER Triage Game</p>
                  <h1 className="mt-1 text-xl font-black tracking-tight sm:text-3xl">Pick fast, regret faster.</h1>
                </div>
                <div className="hidden w-full gap-3 sm:grid sm:w-auto sm:grid-flow-col">
                  <div className="rounded-2xl bg-emerald-50 px-4 py-3 shadow-sm">
                    <div className="text-xs font-bold uppercase tracking-[0.2em] text-emerald-700">Lives Saved</div>
                    <div className="text-2xl font-black text-emerald-800">{livesSaved}/10</div>
                  </div>
                  <div className="rounded-2xl bg-rose-50 px-4 py-3 shadow-sm">
                    <div className="text-xs font-bold uppercase tracking-[0.2em] text-rose-700">Money Wasted</div>
                    <div className="text-2xl font-black text-rose-800">{currency(moneyWasted)}</div>
                  </div>
                  <div className="rounded-2xl bg-slate-900 px-4 py-3 text-white shadow-sm">
                    <div className="text-xs font-bold uppercase tracking-[0.2em] text-slate-300">Countdown</div>
                    <div className={"text-2xl font-black " + (timeLeft <= 3 ? "text-rose-300" : "text-white")}>
                      {timeLeft}s
                    </div>
                  </div>
                  <button
                    onClick={() => setQuit(true)}
                    className="rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-bold text-slate-700 shadow-sm transition hover:bg-slate-50"
                  >
                    Quit Game
                  </button>
                </div>
                <button
                  onClick={() => setQuit(true)}
                  className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs font-bold uppercase tracking-[0.18em] text-slate-700 shadow-sm transition hover:bg-slate-50 sm:hidden"
                >
                  Quit
                </button>
              </div>

              <div className="grid gap-4 lg:grid-cols-[1.05fr_1.15fr] lg:gap-6">
                <CartoonPatient patient={patient} />

                <div className="rounded-[1.6rem] border border-white/70 bg-white/90 p-4 shadow-soft backdrop-blur sm:rounded-[2rem] sm:p-6">
                  <div className="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                    <div>
                      <p className="text-xs font-bold uppercase tracking-[0.28em] text-slate-500 sm:text-sm">
                        Patient {progressLabel}
                      </p>
                      <h2 className="mt-1 text-2xl font-black tracking-tight sm:mt-2 sm:text-4xl">
                        {patient.name}, {patient.age}
                      </h2>
                      <p className="mt-2 text-sm text-slate-600 sm:mt-3 sm:text-lg">{patient.intro}</p>
                    </div>
                    <div className="w-fit rounded-full bg-sky-100 px-3 py-1.5 text-xs font-bold text-sky-700 sm:px-4 sm:py-2 sm:text-sm">
                      {patient.complaint}
                    </div>
                  </div>

                  <div className="mt-4 grid gap-4 md:grid-cols-2 sm:mt-6 sm:gap-5">
                    <div className="rounded-[1.25rem] bg-slate-50 p-3 sm:rounded-[1.5rem] sm:p-4">
                      <p className="text-xs font-bold uppercase tracking-[0.22em] text-slate-500 sm:text-sm">Symptoms</p>
                      <div className="mt-2 flex flex-wrap gap-2 sm:mt-3">
                        {patient.symptoms.map((symptom) => (
                          <span
                            key={symptom}
                            className="rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 sm:py-2 sm:text-sm"
                          >
                            {symptom}
                          </span>
                        ))}
                      </div>
                    </div>

                    <div className="rounded-[1.25rem] bg-rose-50 p-3 sm:rounded-[1.5rem] sm:p-4">
                      <p className="text-xs font-bold uppercase tracking-[0.22em] text-rose-500 sm:text-sm">Labs</p>
                      <div className="mt-2 flex flex-wrap gap-2 sm:mt-3">
                        {patient.labs.length ? (
                          patient.labs.map((lab) => (
                            <span
                              key={lab}
                              className="rounded-full border border-rose-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 sm:py-2 sm:text-sm"
                            >
                              {lab}
                            </span>
                          ))
                        ) : (
                          <span className="rounded-full border border-rose-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-500 sm:py-2 sm:text-sm">
                            No dramatic labs. Yet.
                          </span>
                        )}
                      </div>
                    </div>
                  </div>

                  <div className="mt-4 sm:mt-6">
                    <p className="text-xs font-bold uppercase tracking-[0.22em] text-slate-500 sm:text-sm">Choose Their Fate</p>
                    <div className="mt-2 grid gap-2.5 sm:mt-3 sm:grid-cols-2 sm:gap-3">
                      {TRIAGE_OPTIONS.map((option) => (
                        <button
                          key={option}
                          onClick={() => resolveChoice(option)}
                          disabled={Boolean(feedback)}
                          className="rounded-[1rem] border border-slate-200 bg-white px-4 py-3 text-left text-sm font-bold text-slate-800 shadow-sm transition hover:-translate-y-0.5 hover:border-sky-300 hover:bg-sky-50 disabled:cursor-not-allowed disabled:opacity-50 sm:rounded-[1.25rem] sm:py-4 sm:text-base"
                        >
                          {option}
                        </button>
                      ))}
                    </div>
                  </div>

                  {feedback && (
                    <div className="mt-4 rounded-[1.25rem] border border-slate-200 bg-slate-900 p-4 text-white shadow-lg sm:mt-6 sm:rounded-[1.5rem] sm:p-5">
                      <div className="flex flex-wrap items-center justify-between gap-3">
                        <div>
                          <p className="text-xs font-bold uppercase tracking-[0.24em] text-slate-400 sm:text-sm">
                            {feedback.title}
                          </p>
                          <h3 className="mt-2 text-xl font-black sm:text-2xl">{feedback.choice}</h3>
                        </div>
                        <div className="rounded-full bg-white/10 px-4 py-2 text-xs font-bold text-slate-200 sm:text-sm">
                          {feedback.savedDelta ? "+1 life" : "+0 lives"} / {currency(feedback.moneyDelta)} damage
                        </div>
                      </div>
                      <p className="mt-3 text-sm leading-relaxed text-slate-100 sm:mt-4 sm:text-lg">{feedback.roast}</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
            <div className="fixed inset-x-0 bottom-0 z-20 border-t border-slate-200 bg-white/95 px-3 py-3 shadow-[0_-12px_30px_rgba(15,23,42,0.12)] backdrop-blur sm:hidden">
              <div className="mx-auto grid max-w-6xl grid-cols-[1fr_1fr_auto] gap-2">
                <div className="rounded-2xl bg-emerald-50 px-3 py-2 text-center">
                  <div className="text-[10px] font-bold uppercase tracking-[0.18em] text-emerald-700">Lives</div>
                  <div className="text-lg font-black text-emerald-800">{livesSaved}/10</div>
                </div>
                <div className="rounded-2xl bg-rose-50 px-3 py-2 text-center">
                  <div className="text-[10px] font-bold uppercase tracking-[0.18em] text-rose-700">Money</div>
                  <div className="text-lg font-black text-rose-800">{currency(moneyWasted)}</div>
                </div>
                <div className="rounded-2xl bg-slate-900 px-3 py-2 text-center text-white">
                  <div className="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-300">Time</div>
                  <div className={"text-lg font-black " + (timeLeft <= 3 ? "text-rose-300" : "text-white")}>
                    {timeLeft}s
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
